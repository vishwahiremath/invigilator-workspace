<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Invigilator proctoring engine demo — face detection, eye tracking, and multi-face alerts via MediaPipe in a Web Worker." />
  <title>Invigilator – Demo</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }

    #video-wrapper { border: 2px solid #d1d5db; }
    #video-wrapper.alert { border-color: #ef4444; }

    @keyframes pulse-badge {
      0%, 100% { opacity: 1; }
      50% { opacity: .55; }
    }
    .badge-pulse { animation: pulse-badge 1.2s ease-in-out infinite; }

    #log-container { max-height: 260px; }
    #log-container::-webkit-scrollbar { width: 4px; }
    #log-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    input[type="number"]:focus { outline: 2px solid #3b82f6; outline-offset: 1px; }
    input[type="number"] { -moz-appearance: textfield; }
  </style>
</head>

<body class="bg-white text-gray-800 min-h-screen">
  <canvas id="frame-canvas" class="hidden"></canvas>

  <div class="max-w-5xl mx-auto px-4 py-6">

    <!-- Header -->
    <header class="mb-6">
      <h1 class="text-xl font-semibold text-gray-900">Invigilator</h1>
      <p class="text-sm text-gray-500 mt-0.5">Proctoring engine demo — face mesh, eye tracking &amp; multi-face detection</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">

      <!-- LEFT: Video + Config -->
      <div class="lg:col-span-2 space-y-4">

        <!-- Video -->
        <div class="border border-gray-200 rounded-lg p-3 bg-gray-50">
          <div id="video-wrapper" class="rounded overflow-hidden bg-gray-900">
            <video id="webcam" autoplay playsinline muted class="w-full aspect-video object-cover"></video>
          </div>

          <div class="mt-3 flex gap-2">
            <button id="start-btn"
              class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1">
              ▶ Start Invigilator
            </button>
            <button id="stop-btn" disabled
              class="px-4 py-2 text-sm font-medium text-gray-600 bg-white border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-1">
              ■ Stop Exam
            </button>
          </div>
        </div>

        <!-- Config -->
        <div class="border border-gray-200 rounded-lg p-4">
          <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Configuration</h2>

          <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
            <div>
              <label for="input-faces-limit" class="block text-xs text-gray-500 mb-1">Max faces</label>
              <input id="input-faces-limit" type="number" value="1" min="1"
                class="w-full border border-gray-300 rounded px-2.5 py-1.5 text-sm text-gray-800 bg-white" />
            </div>
            <div>
              <label for="input-fast-loop" class="block text-xs text-gray-500 mb-1">Fast loop (ms)</label>
              <input id="input-fast-loop" type="number" value="300" step="50" min="100"
                class="w-full border border-gray-300 rounded px-2.5 py-1.5 text-sm text-gray-800 bg-white" />
            </div>
            <div>
              <label for="input-slow-loop" class="block text-xs text-gray-500 mb-1">Slow loop (ms)</label>
              <input id="input-slow-loop" type="number" value="3000" step="500" min="1000"
                class="w-full border border-gray-300 rounded px-2.5 py-1.5 text-sm text-gray-800 bg-white" />
            </div>
            <div>
              <label for="input-away-timeout" class="block text-xs text-gray-500 mb-1">Away timeout (s)</label>
              <input id="input-away-timeout" type="number" value="5" step="1" min="1"
                class="w-full border border-gray-300 rounded px-2.5 py-1.5 text-sm text-gray-800 bg-white" />
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT: Telemetry + Log -->
      <div class="space-y-4">

        <!-- Telemetry -->
        <div class="border border-gray-200 rounded-lg p-4">
          <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Live Telemetry</h2>

          <table class="w-full text-sm">
            <tbody>
              <tr class="border-b border-gray-100">
                <td class="py-1.5 text-gray-500">Face</td>
                <td class="py-1.5 text-right">
                  <span id="badge-face" class="status-badge inline-block px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-400">idle</span>
                </td>
              </tr>
              <tr class="border-b border-gray-100">
                <td class="py-1.5 text-gray-500">Head pose</td>
                <td class="py-1.5 text-right">
                  <span id="badge-head" class="status-badge inline-block px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-400">idle</span>
                </td>
              </tr>
              <tr class="border-b border-gray-100">
                <td class="py-1.5 text-gray-500">Vertical</td>
                <td class="py-1.5 text-right">
                  <span id="badge-vertical" class="status-badge inline-block px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-400">idle</span>
                </td>
              </tr>
              <tr class="border-b border-gray-100">
                <td class="py-1.5 text-gray-500">Eyes</td>
                <td class="py-1.5 text-right">
                  <span id="badge-eyes" class="status-badge inline-block px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-400">idle</span>
                </td>
              </tr>
              <tr class="border-b border-gray-100">
                <td class="py-1.5 text-gray-500">Multi-face</td>
                <td class="py-1.5 text-right">
                  <span id="badge-multiface" class="status-badge inline-block px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-400">idle</span>
                </td>
              </tr>
              <tr class="border-b border-gray-100">
                <td class="py-1.5 text-gray-500">Faces count</td>
                <td class="py-1.5 text-right">
                  <span id="badge-count" class="status-badge inline-block px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-400">—</span>
                </td>
              </tr>
              <tr class="border-b border-gray-100">
                <td class="py-1.5 text-gray-500">Away</td>
                <td class="py-1.5 text-right">
                  <span id="badge-away" class="status-badge inline-block px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-400">0s</span>
                </td>
              </tr>
              <tr>
                <td class="py-2 font-medium text-gray-700">Cheating</td>
                <td class="py-2 text-right">
                  <span id="badge-cheating" class="status-badge inline-block px-2.5 py-0.5 rounded text-xs font-semibold bg-gray-100 text-gray-400">idle</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Log -->
        <div class="border border-gray-200 rounded-lg p-4">
          <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Event Log</h2>
          <div id="log-container" class="overflow-y-auto space-y-0.5 text-xs font-mono text-gray-500">
            <p class="italic text-gray-400">Waiting for engine to start…</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
